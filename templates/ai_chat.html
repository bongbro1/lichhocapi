<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Study Assistant | Premium</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background: radial-gradient(circle at top right, #1e293b, #0f172a, #020617);
        }
        .glass-panel {
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.08);
        }
        .chat-container {
            height: calc(100vh - 220px);
        }
        .user-bubble {
            background: linear-gradient(135deg, #0ea5e9 0%, #2563eb 100%);
            box-shadow: 0 4px 15px rgba(14, 165, 233, 0.3);
        }
        .ai-bubble {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .message-anim {
            animation: fadeIn 0.3s ease-out forwards;
        }
        .custom-scrollbar::-webkit-scrollbar { width: 4px; }
        .custom-scrollbar::-webkit-scrollbar-track { background: transparent; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: rgba(255, 255, 255, 0.1); border-radius: 10px; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
    </style>
</head>
<body class="min-h-screen text-slate-200 overflow-hidden">
    <div class="max-w-5xl mx-auto h-screen flex flex-col p-4 md:p-6">
        <!-- Header -->
        <header class="glass-panel rounded-3xl p-4 mb-6 flex items-center justify-between shadow-2xl">
            <div class="flex items-center gap-4">
                <a href="/dashboard" class="w-10 h-10 flex items-center justify-center rounded-2xl bg-white/5 hover:bg-white/10 transition-all text-slate-400 hover:text-white">
                    <i class="fas fa-chevron-left"></i>
                </a>
                <div class="flex items-center gap-3">
                    <div class="relative">
                        <div class="w-12 h-12 rounded-2xl bg-gradient-to-tr from-sky-500 to-blue-600 flex items-center justify-center text-white shadow-lg">
                            <i class="fas fa-robot text-xl"></i>
                        </div>
                        <div class="absolute -bottom-1 -right-1 w-4 h-4 bg-emerald-500 border-4 border-slate-900 rounded-full"></div>
                    </div>
                    <div>
                        <h1 class="text-lg font-bold text-white leading-none">Trợ lý học tập</h1>
                        <p class="text-xs text-emerald-400 mt-1 font-medium tracking-wide">Qwen2.5 Online</p>
                    </div>
                </div>
            </div>
            <div class="flex items-center gap-2">
                <button onclick="clearChat()" class="px-4 py-2 rounded-xl text-xs font-semibold bg-white/5 hover:bg-rose-500/10 hover:text-rose-400 transition-all border border-white/5">
                    <i class="fas fa-trash-alt mr-2"></i>Làm mới
                </button>
            </div>
        </header>

        <!-- Main Chat Box -->
        <main class="flex-1 glass-panel rounded-[2rem] overflow-hidden flex flex-col mb-6 shadow-2xl relative">
            <div id="chatBox" class="flex-1 overflow-y-auto p-6 space-y-6 custom-scrollbar">
                <!-- AI Initial Message -->
                <div class="flex justify-start message-anim">
                    <div class="max-w-[85%] ai-bubble p-4 rounded-2xl rounded-tl-none shadow-sm">
                        <p class="text-sm leading-relaxed text-slate-300">
                            Chào <span class="text-sky-400 font-semibold">{{ user.name or 'bạn' }}</span>! Mình đã sẵn sàng hỗ trợ bạn tóm tắt bài học, giải bài tập hoặc tra cứu lịch trình. Hôm nay bạn cần mình giúp gì nào?
                        </p>
                        <span class="text-[10px] text-slate-500 mt-2 block">Vừa xong</span>
                    </div>
                </div>
            </div>

            <!-- Quick Actions -->
            <div class="px-6 py-3 border-t border-white/5 bg-white/[0.02]">
                <div class="flex gap-2 overflow-x-auto no-scrollbar pb-1">
                    <button onclick="sendSuggestion('Tóm tắt bài học hôm nay')" class="whitespace-nowrap px-4 py-2 rounded-xl bg-white/5 border border-white/10 text-xs font-medium hover:bg-sky-500/20 hover:border-sky-500/50 transition-all">📚 Tóm tắt bài học</button>
                    <button onclick="sendSuggestion('Tạo câu hỏi ôn tập')" class="whitespace-nowrap px-4 py-2 rounded-xl bg-white/5 border border-white/10 text-xs font-medium hover:bg-indigo-500/20 hover:border-indigo-500/50 transition-all">✍️ Câu hỏi ôn tập</button>
                    <button onclick="sendSuggestion('Giải thích dễ hiểu hơn')" class="whitespace-nowrap px-4 py-2 rounded-xl bg-white/5 border border-white/10 text-xs font-medium hover:bg-emerald-500/20 hover:border-emerald-500/50 transition-all">💡 Giải thích kiến thức</button>
                    <button onclick="sendSuggestion('Gợi ý cách học môn này')" class="whitespace-nowrap px-4 py-2 rounded-xl bg-white/5 border border-white/10 text-xs font-medium hover:bg-amber-500/20 hover:border-amber-500/50 transition-all">🎯 Mẹo học tập</button>
                </div>
            </div>
        </main>

        <!-- Input Area -->
        <footer class="relative z-10">
            <div class="glass-panel p-2 rounded-[2.5rem] flex items-center gap-2 shadow-2xl focus-within:border-sky-500/50 transition-all duration-300">
                <input type="text" id="userInput" 
                    placeholder="Gửi tin nhắn cho trợ lý..." 
                    class="flex-1 bg-transparent border-none px-6 py-4 text-sm text-white placeholder-slate-500 focus:outline-none">
                <button id="sendBtn" onclick="handleSend()" 
                    class="w-12 h-12 rounded-full bg-sky-500 hover:bg-sky-400 text-white flex items-center justify-center transition-all shadow-lg hover:scale-105 active:scale-95 disabled:opacity-50 disabled:scale-100">
                    <i class="fas fa-paper-plane"></i>
                </button>
            </div>
            <p class="text-[10px] text-center text-slate-500 mt-4 uppercase tracking-[0.2em]">Hệ thống AI chạy trên server nội bộ ICTU</p>
        </footer>
    </div>

    <script>
        const chatBox = document.getElementById('chatBox');
        const userInput = document.getElementById('userInput');
        const sendBtn = document.getElementById('sendBtn');
        let chatHistory = [];

        userInput.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') handleSend();
        });

        function sendSuggestion(text) {
            userInput.value = text;
            handleSend();
        }

        function formatTime() {
            const now = new Date();
            return now.getHours() + ":" + now.getMinutes().toString().padStart(2, '0');
        }

        function appendMessage(role, text) {
            const wrapper = document.createElement('div');
            wrapper.className = `flex ${role === 'user' ? 'justify-end' : 'justify-start'} message-anim`;
            
            const inner = `
                <div class="max-w-[85%] ${role === 'user' ? 'user-bubble rounded-tr-none' : 'ai-bubble rounded-tl-none'} p-4 rounded-2xl shadow-lg">
                    <p class="text-sm leading-relaxed">${text.replace(/\n/g, '<br>')}</p>
                    <span class="text-[10px] ${role === 'user' ? 'text-sky-100/70' : 'text-slate-500'} mt-2 block">${formatTime()}</span>
                </div>
            `;
            wrapper.innerHTML = inner;
            chatBox.appendChild(wrapper);
            chatBox.scrollTo({ top: chatBox.scrollHeight, behavior: 'smooth' });
        }

        function showLoading() {
            const loading = document.createElement('div');
            loading.id = 'aiLoading';
            loading.className = 'flex justify-start message-anim';
            loading.innerHTML = `
                <div class="ai-bubble p-4 rounded-2xl rounded-tl-none flex gap-1.5 items-center">
                    <div class="w-1.5 h-1.5 bg-sky-500 rounded-full animate-bounce"></div>
                    <div class="w-1.5 h-1.5 bg-sky-500 rounded-full animate-bounce [animation-delay:0.2s]"></div>
                    <div class="w-1.5 h-1.5 bg-sky-500 rounded-full animate-bounce [animation-delay:0.4s]"></div>
                </div>
            `;
            chatBox.appendChild(loading);
            chatBox.scrollTo({ top: chatBox.scrollHeight, behavior: 'smooth' });
        }

        async function handleSend() {
            const text = userInput.value.trim();
            if (!text || sendBtn.disabled) return;

            appendMessage('user', text);
            userInput.value = '';
            userInput.disabled = true;
            sendBtn.disabled = true;
            showLoading();

            try {
                const response = await fetch('/api/ai/chat', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        message: text,
                        history: chatHistory
                    })
                });

                const result = await response.json();
                document.getElementById('aiLoading')?.remove();

                if (result.success) {
                    appendMessage('assistant', result.reply);
                    chatHistory.push({ role: 'user', content: text });
                    chatHistory.push({ role: 'assistant', content: result.reply });
                    if (chatHistory.length > 10) chatHistory = chatHistory.slice(-10);
                } else {
                    appendMessage('assistant', `❌ ${result.error || 'Có lỗi xảy ra'}`);
                }
            } catch (error) {
                document.getElementById('aiLoading')?.remove();
                appendMessage('assistant', '❌ Lỗi kết nối server.');
            } finally {
                userInput.disabled = false;
                sendBtn.disabled = false;
                userInput.focus();
            }
        }

        function clearChat() {
            if(confirm('Bạn có chắc muốn xóa lịch sử trò chuyện?')) {
                chatBox.innerHTML = '';
                chatHistory = [];
                appendMessage('assistant', 'Hội thoại đã được làm mới. Mình sẵn sàng cho câu hỏi tiếp theo!');
            }
        }
    </script>
</body>
</html>
