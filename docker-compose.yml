version: '3.8'

services:
  backend:
    build: .
    container_name: tnut-ictu-api
    restart: always
    ports:
      - "5000:5000"
    environment:
      - PORT=5000
      - FLASK_ENV=production
      # - FCM_SERVICE_ACCOUNT_PATH=/app/config/serviceAccount.json
    volumes:
      - ./domains/tnut/data:/app/domains/tnut/data
      - ./domains/ictu/data:/app/domains/ictu/data
      - ./storage:/app/storage

# Lệnh chạy: docker-compose up -d --build
